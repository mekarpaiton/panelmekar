name: panelmekar
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: 1.0.6
  google_fonts: 6.1.0
  http: 1.1.2
  intl: 0.18.1
  excel: 4.0.2
  path_provider: 2.1.2
  share_plus: 7.2.1
  bluetooth_print: 4.2.2
  permission_handler: 10.4.5  # ← DOWNGRADE DARI 11.3.1
  image_picker: 1.0.7
  url_launcher: 6.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 3.0.1
  flutter_launcher_icons: 0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo.png"