name: Build APK TB MEKAR

on:
  push:
    branches: [ main, master ] # ← Jalan tiap push ke main
  workflow_dispatch: # ← Bisa manual pencet tombol "Run workflow"

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: cirrusci/flutter:3.19.6  # ← Image udah include semua
    
    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Flutter pub get
        run: flutter pub get

      - name: Build APK Release
        run: flutter build apk --release --split-per-abi

      - name: Upload APK ke Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apk-release-tbmekar
          path: build/app/outputs/flutter-apk/*.apk