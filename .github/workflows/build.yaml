name: Build APK TB MEKAR

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '11'  # ← PAKE 11

      - name: Setup Flutter 3.19.6
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'  # ← DOWNGRADE
          channel: 'stable'
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK Release
        run: flutter build apk --release --split-per-abi

      - name: Upload APK ke Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apk-release-tbmekar
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30

      - name: Bikin Release Otomatis
        uses: ncipollo/release-action@v1
        with:
          artifacts: "build/app/outputs/flutter-apk/*.apk"
          tag: v${{ github.run_number }}
          name: TB MEKAR v${{ github.run_number }}
          body: |
            Build otomatis dari commit ${{ github.sha }}
            Download APK di bawah buat install di HP
          token: ${{ secrets.GITHUB_TOKEN }}